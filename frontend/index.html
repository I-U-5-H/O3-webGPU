    <title>Project O3</title>
    <style>
      /* Force Modern Dark Scrollbar Everywhere */
      ::-webkit-scrollbar { 
        width: 8px !important; 
        height: 8px !important; 
      }
      ::-webkit-scrollbar-track { 
        background: #131314 !important; /* Blends into your app background */
      }
      ::-webkit-scrollbar-thumb { 
        background: #374151 !important; /* Sleek dark gray */
        border-radius: 10px !important; 
      }
      ::-webkit-scrollbar-thumb:hover { 
        background: #4b5563 !important; 
      }
      /* Firefox compatibility */
      * {
        scrollbar-width: thin !important;
        scrollbar-color: #374151 #131314 !important;
      }
    </style>
  </head>

    <div id="root"></div>

  </body>
